name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -v

  build-docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t pipeline-lab:${{ github.sha }} .

      - name: Smoke test the container
        run: |
          docker run -d -p 8000:8000 --name pipeline-lab pipeline-lab:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8000/health || exit 1
          docker stop pipeline-lab
